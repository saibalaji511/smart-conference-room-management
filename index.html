<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orientbell Smart Conference Room Management</title>
    <meta name="description" content="Smart Conference Room Management System for Orientbell Limited" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="app.css" />
</head>

<body>
    <div id="app">
        <div id="login-screen" class="login-screen">
            <div class="login-bg-orbs">
                <div class="orb orb-1"></div>
                <div class="orb orb-2"></div>
                <div class="orb orb-3"></div>
            </div>
            <div class="login-card" id="login-card">
                <div class="login-logo">
                    <div class="logo-icon"><i class="fas fa-building"></i></div>
                    <h1>Orientbell</h1>
                    <p class="login-subtitle">Smart Conference Room Management</p>
                </div>
                <!-- Login/Register Tabs -->
                <div class="tabs" id="auth-tabs" style="margin-bottom:var(--space-md)">
                    <button class="tab active" data-tab="login">Sign In</button>
                    <button class="tab" data-tab="register">Register</button>
                </div>
                <!-- LOGIN FORM -->
                <form id="login-form" autocomplete="off">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="e.g. rajiv@orientbell.com" required />
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="login-btn"><i
                            class="fas fa-sign-in-alt"></i> Sign In</button>
                    <div class="auth-divider"><span>or</span></div>
                    <button type="button" class="btn btn-google btn-block" id="google-login-btn">
                        <svg width="18" height="18" viewBox="0 0 48 48">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        </svg>
                        Sign in with Google
                    </button>
                </form>
                <!-- REGISTER FORM -->
                <form id="register-form" class="hidden" autocomplete="off">
                    <div class="form-group">
                        <label for="reg-name">Full Name *</label>
                        <input type="text" id="reg-name" placeholder="e.g. Rajiv Sharma" required />
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email Address *</label>
                        <input type="email" id="reg-email" placeholder="e.g. rajiv@orientbell.com" required />
                    </div>
                    <div class="form-group">
                        <label for="reg-mobile">Mobile Number</label>
                        <input type="tel" id="reg-mobile" placeholder="e.g. 9876543210" />
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reg-role">Role *</label>
                            <select id="reg-role" required>
                                <option value="admin">Admin</option>
                                <option value="manager">Manager</option>
                                <option value="employee" selected>Employee</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="reg-dept">Department</label>
                            <select id="reg-dept">
                                <option>IT</option>
                                <option>Marketing</option>
                                <option>Sales</option>
                                <option>HR</option>
                                <option>Engineering</option>
                                <option>Design</option>
                                <option>Operations</option>
                                <option>Finance</option>
                                <option>Management</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reg-office">Office</label>
                        <select id="reg-office"></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="reg-password">Create Password *</label>
                            <input type="password" id="reg-password" placeholder="Min 6 characters" minlength="6"
                                required />
                        </div>
                        <div class="form-group">
                            <label for="reg-confirm">Confirm Password *</label>
                            <input type="password" id="reg-confirm" placeholder="Re-enter password" required />
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Create
                        Account</button>
                    <div class="auth-divider"><span>or</span></div>
                    <button type="button" class="btn btn-google btn-block" id="google-register-btn">
                        <svg width="18" height="18" viewBox="0 0 48 48">
                            <path fill="#EA4335"
                                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                            <path fill="#4285F4"
                                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                            <path fill="#FBBC05"
                                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                            <path fill="#34A853"
                                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        </svg>
                        Sign up with Google
                    </button>
                </form>
                <p class="login-hint">Select your <strong>Role</strong> during registration. Use Google for quick
                    sign-in.
                </p>
            </div>
        </div>
        <div id="app-shell" class="app-shell hidden">
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-logo">
                        <div class="logo-icon-sm"><i class="fas fa-building"></i></div><span
                            class="sidebar-brand">Orientbell</span>
                    </div>
                </div>
                <nav id="sidebar-nav" class="sidebar-nav"></nav>
                <div class="sidebar-footer">
                    <div class="sidebar-user">
                        <div class="user-avatar" id="user-avatar">RS</div>
                        <div class="user-info"><span class="user-name" id="user-name">User</span><span class="user-role"
                                id="user-role">Role</span></div>
                    </div>
                    <button id="logout-btn" class="btn btn-ghost btn-sm"><i class="fas fa-sign-out-alt"></i>
                        Logout</button>
                </div>
            </aside>
            <main id="main-content" class="main-content">
                <header class="topbar">
                    <button id="mobile-menu-btn" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
                    <div class="topbar-title">
                        <h2 id="page-title">Dashboard</h2>
                        <p id="page-subtitle" class="topbar-subtitle"></p>
                    </div>
                    <div class="topbar-actions">
                        <button class="btn btn-icon" id="notif-btn" title="Notifications"><i
                                class="fas fa-bell"></i><span class="notif-badge" id="notif-badge">0</span></button>
                    </div>
                </header>
                <div id="view-container" class="view-container"></div>
            </main>
        </div>
        <div id="toast-container" class="toast-container"></div>
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-content" class="modal-content"></div>
        </div>
        <div id="notif-panel" class="notif-panel hidden">
            <div class="notif-panel-header">
                <h3>Notifications</h3><button id="notif-close" class="btn btn-icon btn-sm"><i
                        class="fas fa-times"></i></button>
            </div>
            <div id="notif-list" class="notif-list"></div>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="views.js"></script>
    <script src="views2.js"></script>
    <script src="views3.js"></script>
    <script src="app.js"></script>
</body>

</html>
